<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monad Block Dodger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000010;font-family:'Press Start 2P',monospace;overflow:hidden;user-select:none;display:flex;justify-content:center;align-items:flex-start}
#wrap{position:relative;width:100vw;max-width:900px;height:100vh;overflow:hidden}
#bgcanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
#gc{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}
#hud{position:absolute;top:0;left:0;width:100%;z-index:5;background:rgba(8,8,24,0.88);border-bottom:2px solid #7c3aed;display:flex;justify-content:space-between;align-items:center;padding:8px 14px;gap:8px;flex-wrap:wrap}
.hud-block{display:flex;flex-direction:column;align-items:center;gap:2px}
.hud-label{color:#4c1d95;font-size:5px}
.hud-val{color:#a78bfa;font-size:9px}
#chain-dot{width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block;animation:blink 1s infinite;margin-right:4px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,8,24,.93);overflow-y:auto;padding:20px 0}
#overlay h1{color:#a78bfa;font-size:13px;margin-bottom:12px;text-align:center;line-height:1.9;text-shadow:0 0 20px #7c3aed}
#overlay p{color:#6d28d9;font-size:6px;text-align:center;line-height:2;margin-bottom:5px;max-width:300px}
.big-btn{background:#7c3aed;color:#fff;border:2px solid #a78bfa;font-family:'Press Start 2P',monospace;font-size:9px;padding:12px 22px;cursor:pointer;margin-top:10px;display:block;width:220px;text-align:center}
.big-btn:hover{background:#6d28d9}
#char-select{display:flex;gap:12px;margin:12px 0;justify-content:center;flex-wrap:wrap}
.char-card{border:2px solid #4c1d95;padding:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(124,58,237,.1);transition:border-color .2s;min-width:64px}
.char-card img{width:50px;height:50px;object-fit:contain}
.char-card span{font-size:5px;color:#a78bfa;text-align:center}
.char-card.locked{opacity:.4;cursor:not-allowed}
.char-card.active{border-color:#a78bfa;background:rgba(124,58,237,.35)}
#leaderboard-panel{position:absolute;top:0;right:0;width:175px;height:100%;z-index:6;background:rgba(8,8,24,.95);border-left:2px solid #7c3aed;padding:10px 8px;overflow-y:auto;transform:translateX(100%);transition:transform .3s}
#leaderboard-panel.open{transform:translateX(0)}
#lb-title{color:#a78bfa;font-size:7px;margin-bottom:10px;text-align:center;padding-top:52px}
.lb-entry{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #1e1040;font-size:6px}
.lb-rank{color:#4c1d95;width:14px}
.lb-name{color:#c4b5fd;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px}
.lb-score{color:#10b981}
#lb-toggle{position:absolute;top:50%;right:0;z-index:7;transform:translateY(-50%);background:#7c3aed;border:none;color:#fff;font-family:'Press Start 2P',monospace;font-size:6px;padding:6px 4px;cursor:pointer;writing-mode:vertical-rl}
#lb-toggle.open{right:175px}
#powerup-bar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:8px}
.pu-slot{width:42px;height:42px;border:2px solid #4c1d95;background:rgba(8,8,24,.85);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;position:relative}
.pu-slot .pu-icon{font-size:13px}
.pu-slot .pu-label{font-size:4px;color:#7c3aed}
.pu-slot.active{border-color:#a78bfa;background:rgba(124,58,237,.3)}
.pu-timer{position:absolute;bottom:0;left:0;height:3px;background:#a78bfa;transition:width .1s linear}
#level-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15;color:#f59e0b;font-size:16px;text-align:center;pointer-events:none;opacity:0;transition:opacity .4s;text-shadow:0 0 24px #f59e0b}
#name-input-wrap{display:flex;gap:8px;align-items:center;margin-top:8px}
#player-name{background:rgba(124,58,237,.2);border:2px solid #7c3aed;color:#a78bfa;font-family:'Press Start 2P',monospace;font-size:7px;padding:8px;width:170px;outline:none}
#scanlines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);z-index:10}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="bgcanvas"></canvas>
  <canvas id="gc"></canvas>
  <div id="scanlines"></div>

  <div id="hud">
    <div class="hud-block"><div class="hud-label">SCORE</div><div class="hud-val" id="hud-score">0</div></div>
    <div class="hud-block"><div class="hud-label">BEST</div><div class="hud-val" id="hud-best">0</div></div>
    <div class="hud-block"><div class="hud-label">LEVEL</div><div class="hud-val" id="hud-level">1</div></div>
    <div class="hud-block"><div class="hud-label">LIVES</div><div class="hud-val" id="hud-lives">♥♥♥</div></div>
    <div class="hud-block">
      <div class="hud-val"><span id="chain-dot"></span><span id="hud-block">—</span></div>
      <div class="hud-label">MONAD BLOCK</div>
    </div>
    <div id="matrix-hud" style="display:none;color:#00ff41;font-size:8px;text-shadow:0 0 8px #00ff41;animation:blink 0.5s infinite"></div>
    <button id="mute-btn" onclick="toggleMute()" style="background:transparent;border:1px solid #4c1d95;color:#a78bfa;font-family:'Press Start 2P',monospace;font-size:6px;padding:4px 8px;cursor:pointer">♪ ON</button>
    <div class="hud-block" id="hud-char-wrap" style="cursor:pointer" onclick="toggleCharPanel()">
      <div class="hud-label">CHARACTER</div>
      <div class="hud-val" id="hud-char-name" style="font-size:6px">SALMONAD</div>
    </div>
  </div>
  <div id="char-panel" style="position:absolute;top:52px;right:0;z-index:15;background:rgba(8,8,24,.97);border:2px solid #7c3aed;border-top:none;padding:10px 12px;display:none;flex-direction:column;align-items:center;gap:8px">
    <div style="color:#a78bfa;font-size:6px;margin-bottom:4px">SWITCH CHARACTER</div>
    <div id="char-panel-inner" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center"></div>
    <button onclick="toggleCharPanel()" style="background:transparent;border:1px solid #4c1d95;color:#6d28d9;font-family:'Press Start 2P',monospace;font-size:5px;padding:4px 10px;cursor:pointer;margin-top:4px">CLOSE</button>
  </div>

  <div id="powerup-bar">
    <div class="pu-slot" id="pu-shield">
      <svg width="20" height="22" viewBox="0 0 20 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 1 C14 4 18 4 18 4 C18 4 18 12 10 20 C2 12 2 4 2 4 C2 4 6 4 10 1Z" stroke="#06b6d4" stroke-width="1.8" fill="#06b6d411"/>
        <path d="M10 6 C12 7.5 13.5 8 13.5 8 C13.5 8 13.5 13 10 17 C6.5 13 6.5 8 6.5 8 C6.5 8 8 7.5 10 6Z" stroke="#06b6d4" stroke-width="1.2" fill="none"/>
      </svg>
      <div class="pu-label">SHIELD</div><div class="pu-timer" id="pt-shield" style="width:0%"></div>
    </div>
    <div class="pu-slot" id="pu-zap">
      <svg width="16" height="22" viewBox="0 0 16 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 1 L4 11 L8 11 L6 21 L14 9 L10 9 L13 1Z" stroke="#ffff00" stroke-width="1.8" stroke-linejoin="round" fill="#ffff0022"/>
      </svg>
      <div class="pu-label">ZAP</div><div class="pu-timer" id="pt-zap" style="width:0%"></div>
    </div>
    <div class="pu-slot" id="pu-shrink">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 3 L7 7 M17 3 L13 7 M3 17 L7 13 M17 17 L13 13" stroke="#ec4899" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M7 7 L13 7 L13 13 L7 13 Z" stroke="#ec4899" stroke-width="1.5" fill="#ec489922"/>
        <circle cx="10" cy="10" r="1.5" fill="#ec4899"/>
      </svg>
      <div class="pu-label">SHRINK</div><div class="pu-timer" id="pt-shrink" style="width:0%"></div>
    </div>
    <div class="pu-slot" id="pu-repel">
      <svg width="22" height="16" viewBox="0 0 22 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 8 L2 8 M2 8 L5 5 M2 8 L5 11" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 8 L20 8 M20 8 L17 5 M20 8 L17 11" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="10" y1="3" x2="10" y2="13" stroke="#10b981" stroke-width="1.2" stroke-dasharray="2 2"/>
        <line x1="12" y1="3" x2="12" y2="13" stroke="#10b981" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.5"/>
      </svg>
      <div class="pu-label">REPEL</div><div class="pu-timer" id="pt-repel" style="width:0%"></div>
    </div>
  </div>

  <div id="level-banner">LEVEL UP!</div>

  <button id="lb-toggle">SCORES</button>
  <div id="leaderboard-panel">
    <div id="lb-title">TOP 10</div>
    <div id="lb-entries"></div>
  </div>

  <div id="overlay">
    <h1>MONAD<br>BLOCK DODGER</h1>
    <p>Dodge falling blocks from Monad mainnet · Live data every 400ms</p>
    <div id="name-input-wrap">
      <input id="player-name" maxlength="10" placeholder="YOUR NAME" />
    </div>
    <p style="color:#4c1d95;font-size:5px;margin-top:6px">Choose your character:</p>
    <div id="char-select"></div>
    <p style="color:#6d28d9;font-size:5px">Arrow keys / WASD · New chars unlock each level</p>
    <button class="big-btn" id="start-btn">INSERT COIN</button>
  </div>
</div>

CHARS.forEach(function(c){
  var img=new Image();img.src='data:image/png;base64,'+c.b64;charImgs[c.id]=img;
});

function genStars(){
  if(!state)return;state.stars=[];bgChain=[];
  for(var i=0;i<80;i++)state.stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.4+0.3,b:Math.random()});
}

// Per-level bg tint: subtle purple->white shift
var BG_LEVELS=[
  {bg:'#07060f',block:'#1a0a3a',line:'#2d1060',alpha:0.06},  // L1 near black
  {bg:'#09071a',block:'#1f0d44',line:'#341470',alpha:0.07},  // L2
  {bg:'#0b0820',block:'#24104e',line:'#3b197e',alpha:0.08},  // L3
  {bg:'#0d0a24',block:'#2a1358',line:'#43208c',alpha:0.09},  // L4
  {bg:'#0f0b28',block:'#301662',line:'#4c279a',alpha:0.10},  // L5
  {bg:'#110d2c',block:'#36196c',line:'#542ea8',alpha:0.11},  // L6
  {bg:'#130e30',block:'#3c1c76',line:'#5c35b6',alpha:0.12},  // L7
  {bg:'#150f34',block:'#421f80',line:'#643cc4',alpha:0.13},  // L8+
];

var bgTransition={from:0,to:0,t:1.0};
var bgChain=[];  // blockchain node positions

function lerp(a,b,t){return a+(b-a)*t;}
function lerpHex(c1,c2,t){
  var r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  var r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  var r=Math.round(lerp(r1,r2,t)),g=Math.round(lerp(g1,g2,t)),b=Math.round(lerp(b1,b2,t));
  return '#'+('0'+r.toString(16)).slice(-2)+('0'+g.toString(16)).slice(-2)+('0'+b.toString(16)).slice(-2);
}

function triggerBgTransition(level){
  bgTransition.from=bgTransition.to;
  bgTransition.to=Math.min(level-1,BG_LEVELS.length-1);
  bgTransition.t=0;
}

function genChain(){
  bgChain=[];
  var cols=Math.floor(W/90)+1;
  var rows=Math.floor(H/70)+1;
  for(var ci=0;ci<cols;ci++){
    for(var ri=0;ri<rows;ri++){
      bgChain.push({
        x:ci*90+20+Math.random()*40,
        y:ri*70+10+Math.random()*40,
        w:28+Math.random()*18,
        h:14+Math.random()*10,
        r:2+Math.random()*3,
        pulse:Math.random()*Math.PI*2,
        speed:0.3+Math.random()*0.5,
        linked: ri>0 ? true : false
      });
    }
  }
}

function drawBg(){
  if(bgTransition.t<1) bgTransition.t=Math.min(1,bgTransition.t+0.006);
  var t=bgTransition.t;
  var thA=BG_LEVELS[bgTransition.from];
  var thB=BG_LEVELS[bgTransition.to];
  var bgCol=lerpHex(thA.bg,thB.bg,t);
  var blockCol=lerpHex(thA.block,thB.block,t);
  var lineCol=lerpHex(thA.line,thB.line,t);
  var alpha=lerp(thA.alpha,thB.alpha,t);

  bctx.fillStyle=bgCol;
  bctx.fillRect(0,0,W,H);

  if(!bgChain.length) genChain();

  var now=Date.now()/1000;

  // Subtle blockchain texture — hash lines and connector dots only
  bctx.save();
  bgChain.forEach(function(b,i){
    var pulse=alpha*0.6+Math.sin(now*b.speed+b.pulse)*alpha*0.4;

    // Dashed connector line between nodes
    if(b.linked && i>=1 && bgChain[i-1]){
      var prev=bgChain[i-1];
      bctx.globalAlpha=pulse*0.4;
      bctx.strokeStyle=lineCol;
      bctx.lineWidth=0.4;
      bctx.setLineDash([2,8]);
      bctx.beginPath();
      bctx.moveTo(prev.x+prev.w/2, prev.y+prev.h);
      bctx.lineTo(b.x+b.w/2, b.y);
      bctx.stroke();
      bctx.setLineDash([]);
    }

    // Hash lines only — no block fill
    bctx.globalAlpha=pulse*0.45;
    bctx.strokeStyle=lineCol;
    bctx.lineWidth=0.5;
    for(var li=0;li<2;li++){
      bctx.beginPath();
      bctx.moveTo(b.x+2, b.y+3+li*5);
      bctx.lineTo(b.x+b.w-2, b.y+3+li*5);
      bctx.stroke();
    }

    // Node dot at connection point
    bctx.globalAlpha=pulse*0.35;
    bctx.fillStyle=lineCol;
    bctx.beginPath();
    bctx.arc(b.x+b.w/2, b.y+b.h/2, 1.2, 0, Math.PI*2);
    bctx.fill();
  });
  bctx.restore();

  // Stars — faint white/lavender dots
  if(!state)return;
  state.stars.forEach(function(s){
    var twinkle=0.05+s.b*0.12+Math.sin(now*0.8+s.x*0.01)*0.04;
    bctx.globalAlpha=Math.max(0,twinkle);
    bctx.fillStyle=s.b>0.6?'#e9d5ff':'#a78bfa';
    bctx.beginPath();bctx.arc(s.x,s.y,s.s*0.7,0,Math.PI*2);bctx.fill();
  });
  bctx.globalAlpha=1;
}

var BCOLS=['#3b0764','#4c1d95','#5b21b6','#6d28d9','#7c3aed','#8b5cf6','#a78bfa','#c4b5fd'];

function spawnBlock(tx,bn){
  var bw=18+Math.random()*22+state.level*1.5;
  var spd=(1.8+state.level*1.4+Math.min(tx/200,3.5));
  state.blocks.push({x:Math.random()*(W-bw),y:HUD_H-28,w:bw,h:12+Math.random()*10,speed:spd,
    color:BCOLS[Math.floor(Math.random()*BCOLS.length)],tx:tx,bn:bn,vx:0});
}

function spawnPU(){
  var types=['shield','zap','shrink','repel'];
  var colors={shield:'#06b6d4',zap:'#ffff00',shrink:'#ec4899',repel:'#10b981'};
  var t=types[Math.floor(Math.random()*4)];
  state.powerups.push({x:30+Math.random()*(W-60),y:HUD_H,w:24,h:24,type:t,color:colors[t],speed:3.5});
}

function spawnMatrix(){
  state.powerups.push({x:30+Math.random()*(W-60),y:HUD_H,w:30,h:30,type:'matrix',color:'#00ff41',speed:3.0,pulse:0});
}

function activatePU(t){
  state.activePU[t]=PUDUR;
  document.getElementById('pu-'+t).classList.add('active');
}

function updatePU(dt){
  PUTYPE.forEach(function(t){
    if(state.activePU[t]>0){
      state.activePU[t]=Math.max(0,state.activePU[t]-dt);
      document.getElementById('pt-'+t).style.width=(state.activePU[t]/PUDUR*100)+'%';
      if(state.activePU[t]<=0){
        document.getElementById('pu-'+t).classList.remove('active');
        document.getElementById('pt-'+t).style.width='0%';
      }
    }
  });
  state.player.w=state.activePU.shrink>0?28:58;
  state.player.h=state.player.w;
}

function hit(px,py,pw,ph,bx,by,bw,bh){
  var m=state.activePU.shrink>0?10:5;
  return px+m<bx+bw&&px+pw-m>bx&&py+m<by+bh&&py+ph-m>by;
}

function particles(x,y,col,n){
  for(var i=0;i<n;i++)state.particles.push({x:x,y:y,vx:(Math.random()-0.5)*6,vy:(Math.random()-2.5)*3.5,life:700,color:col,size:4+Math.random()*3});
}

async function pollChain(){
  try{
    var r=await fetch(RPC,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_getBlockByNumber',params:['latest',false]})});
    var d=await r.json();
    if(d.result){
      var bn=parseInt(d.result.number,16);
      var tx=d.result.transactions?d.result.transactions.length:0;
      if(state&&state.running&&state.blockNum!==bn){
        state.blockNum=bn;state.txCount=tx;state.rpcOk=true;
        document.getElementById('chain-dot').style.background='#10b981';
        document.getElementById('hud-block').textContent='#'+bn.toLocaleString();
        var n=Math.min(Math.max(1,Math.floor(tx/60)+Math.floor(state.level/2)),8);
        var gap=Math.max(30,90-state.level*8);
        for(var i=0;i<n;i++)(function(ii){setTimeout(function(){if(state&&state.running)spawnBlock(tx,bn);},ii*gap);})(i);
      }
    }
  }catch(e){
    document.getElementById('chain-dot').style.background='#ef4444';
    if(state&&state.running){var stx=Math.floor(Math.random()*200)+30;spawnBlock(stx,simTimer);}
  }
}

function doLevelUp(){
  state.level++;state.unlocked=Math.min(CHARS.length,state.level);
  document.getElementById('hud-level').textContent=state.level;
  triggerBgTransition(state.level);
  if(state.unlocked<=CHARS.length) document.getElementById('level-banner').style.color='#a78bfa';
  var b=document.getElementById('level-banner');
  b.textContent='LEVEL '+state.level+'!';b.style.opacity='1';
  sfxLevelUp();updateMusicSpeed();
  setTimeout(function(){b.style.opacity='0';},1800);
  buildCharSelect();
}

function loop(ts){
  if(!state||!state.running)return;
  var dt=Math.min(ts-lastTime,50);lastTime=ts;simTimer+=dt;
  state.score100+=dt;state.levelTimer+=dt;state.puTimer+=dt;
  var pts=Math.floor(state.score100/100);
  if(pts>0){state.score+=pts;state.score100-=pts*100;}
  if(state.levelTimer>10000){doLevelUp();state.levelTimer=0;}
  if(state.puTimer>state.nextPU){spawnPU();state.puTimer=0;state.nextPU=4000+Math.random()*5000;}
  state.matrixSpawn+=dt;
  if(state.matrixSpawn>35000+Math.random()*20000&&state.matrix===0){spawnMatrix();state.matrixSpawn=0;}
  updatePU(dt);
  if(state.zapFlash>0)state.zapFlash=Math.max(0,state.zapFlash-dt);
  if(state.zapEffect>0)state.zapEffect=Math.max(0,state.zapEffect-dt/400);
  if(state.player.iframes>0)state.player.iframes-=dt;
  if(state.matrix>0){
    // AUTO-DODGE AI: find the block that will hit us soonest and flee it
    state.matrix=Math.max(0,state.matrix-dt);
    state.player.iframes=300;
    var bestThreat=null,bestScore2=0;
    var px2=state.player.x+state.player.w/2,py2=state.player.y+state.player.h/2;
    state.blocks.forEach(function(b){
      var bx=b.x+b.w/2,by=b.y+b.h/2;
      var dist=Math.sqrt((bx-px2)*(bx-px2)+(by-py2)*(by-py2));
      var threat=(1/(dist+1))*b.speed*10;
      if(threat>bestScore2){bestScore2=threat;bestThreat=b;}
    });
    var aiSpd=9;
    var midX=W/2, midY=H/2;
    var toCx=midX-px2, toCy=midY-py2;
    var toCmag=Math.sqrt(toCx*toCx+toCy*toCy)||1;
    if(bestThreat){
      var bx=bestThreat.x+bestThreat.w/2,by=bestThreat.y+bestThreat.h/2;
      var dx=px2-bx,dy=py2-by;
      var mag=Math.sqrt(dx*dx+dy*dy)||1;
      // dodge away from threat, but blend in a pull back to centre
      state.player.vx=dx/mag*aiSpd + (toCx/toCmag)*2.5;
      state.player.vy=dy/mag*aiSpd + (toCy/toCmag)*2.5;
    } else {
      // no threat — smoothly glide back to centre
      state.player.vx=toCx/toCmag*aiSpd*0.6;
      state.player.vy=toCy/toCmag*aiSpd*0.6;
    }
  } else {
    var spd=(6+state.level*0.4)*(dt/16);
    var diag=(state.keys['ArrowLeft']||state.keys['a'])&&(state.keys['ArrowUp']||state.keys['w'])||
             (state.keys['ArrowLeft']||state.keys['a'])&&(state.keys['ArrowDown']||state.keys['s'])||
             (state.keys['ArrowRight']||state.keys['d'])&&(state.keys['ArrowUp']||state.keys['w'])||
             (state.keys['ArrowRight']||state.keys['d'])&&(state.keys['ArrowDown']||state.keys['s']);
    var ms=diag?spd*0.707:spd;
    if(state.keys['ArrowLeft']||state.keys['a'])state.player.vx=-ms;
    else if(state.keys['ArrowRight']||state.keys['d'])state.player.vx=ms;
    else state.player.vx*=0.72;
    if(state.keys['ArrowUp']||state.keys['w'])state.player.vy=-ms;
    else if(state.keys['ArrowDown']||state.keys['s'])state.player.vy=ms;
    else state.player.vy*=0.72;
  }
  state.player.x=Math.max(0,Math.min(W-state.player.w,state.player.x+state.player.vx));
  if(state.matrix>0){
    var midClamp=H/2;
    state.player.y=Math.max(HUD_H+80,Math.min(midClamp+80,state.player.y+state.player.vy));
  } else {
    state.player.y=Math.max(HUD_H,Math.min(H-state.player.h,state.player.y+state.player.vy));
  }
  state.blocks=state.blocks.filter(function(b){
    b.y+=b.speed*(dt/16);
    if(state.activePU.repel>0){
      var cx=b.x+b.w/2,cy=b.y+b.h/2,px=state.player.x+state.player.w/2,py=state.player.y+state.player.h/2;
      var dx=cx-px,dy=cy-py,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<190){b.vx+=(dx/dist)*0.65;}
    }
    if(b.vx){b.x+=b.vx*(dt/16);b.vx*=0.9;}
    if(b.y>H+20||b.x<-b.w-20||b.x>W+20)return false;
    if(state.player.iframes<=0&&hit(state.player.x,state.player.y,state.player.w,state.player.h,b.x,b.y,b.w,b.h)){
      if(state.activePU.shield>0){
        state.activePU.shield=0;document.getElementById('pu-shield').classList.remove('active');
        document.getElementById('pt-shield').style.width='0%';
        particles(b.x+b.w/2,b.y+b.h/2,'#06b6d4',16);
      }else{
        state.lives--;state.player.iframes=1200;
        sfxHit();
        particles(state.player.x+state.player.w/2,state.player.y+state.player.h/2,'#ef4444',22);
        document.getElementById('hud-lives').textContent='♥'.repeat(state.lives)+'♡'.repeat(Math.max(0,3-state.lives));
        if(state.lives<=0){endGame();return false;}
      }
      return false;
    }
    return true;
  });

  state.powerups=state.powerups.filter(function(pu){
    pu.y+=pu.speed*(dt/16);if(pu.y>H)return false;
    if(hit(state.player.x,state.player.y,state.player.w,state.player.h,pu.x-pu.w/2,pu.y-pu.h/2,pu.w,pu.h)){
      if(pu.type==='zap'){triggerZap();sfxZap();}
      else if(pu.type==='matrix'){triggerMatrix();sfxMatrix();startMatrixMusic();}
      else{activatePU(pu.type);sfxPowerup();}
      particles(pu.x,pu.y,pu.color,14);return false;
    }
    return true;
  });

  state.particles=state.particles.filter(function(p){
    p.x+=p.vx*(dt/16);p.y+=p.vy*(dt/16);p.vy+=0.14;p.life-=dt;return p.life>0;
  });
  // Rain column physics — updated in loop where dt is available
  if(state.matrix>0){
    if(!state.rainCols||state.rainCols.length===0){
      var nc=Math.floor(W/14);state.rainCols=[];
      for(var ri2=0;ri2<nc;ri2++) state.rainCols.push({x:ri2*14+7,y:Math.random()*H,speed:8+Math.random()*22,trail:[]});
    }
    var mc2='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホ01';
    state.rainCols.forEach(function(col){
      col.y+=col.speed*(dt/16);
      if(col.y>H+20){col.y=HUD_H;col.speed=8+Math.random()*22;col.trail=[];}
      col.trail.push({y:col.y,ch:mc2[Math.floor(Math.random()*mc2.length)]});
      if(col.trail.length>18)col.trail.shift();
    });
  } else {
    if(state.rainCols&&state.rainCols.length>0){
      state.rainCols=[];
      if(currentTrack==='matrix') startMainMusic();
    }
  }
  state.textPops=state.textPops.filter(function(t){
    t.y+=t.vy*(dt/16);t.vy*=0.97;t.life-=dt;return t.life>0;
  });

  // Update bullets — move up, check block collisions
  state.bullets=state.bullets.filter(function(blt){
    blt.y+=blt.vy*(dt/16);
    if(blt.y<-20) return false;
    // Hit test against blocks
    for(var bi=0;bi<state.blocks.length;bi++){
      var b=state.blocks[bi];
      // Use the block's bounding box (account for isometric top face)
      var s=b.w*0.6;
      var iso=s*0.5;
      var bTop=b.y+b.h/2-s-iso;   // topmost point of cube
      var bBot=b.y+b.h/2+iso+s;   // bottommost point
      var bLeft=b.x+b.w/2-s;      // leftmost
      var bRight=b.x+b.w/2+s;     // rightmost
      if(blt.x>bLeft && blt.x<bRight && blt.y>bTop && blt.y<bBot){
        state.score+=25;
        sfxBlockShot();
        particles(b.x+b.w/2,b.y+b.h/2,b.color,12);
        state.textPops.push({x:b.x+b.w/2,y:b.y,vy:-1.5,life:800,maxLife:800,
          text:'+25',color:'#ffffff',size:10});
        state.blocks.splice(bi,1);
        return false; // remove bullet
      }
    }
    return true;
  });

  if(state.score>bestScore)bestScore=state.score;
  document.getElementById('hud-score').textContent=state.score;
  document.getElementById('hud-best').textContent=bestScore;
  var matEl=document.getElementById('matrix-hud');
  if(matEl){
    if(state.matrix>0){
      matEl.style.display='block';
      matEl.textContent='MATRIX '+Math.ceil(state.matrix/1000)+'s';
    } else {
      matEl.style.display='none';
    }
  }
  drawFrame();
  animId=requestAnimationFrame(loop);
}

var puIcons={shield:'[SH]',zap:'[ZP]',shrink:'[SZ]',repel:'[RP]'};

function drawFrame(){
  drawBg();
  ctx.clearRect(0,0,W,H);
  var inMatrix=state.matrix>0;
  // Matrix green background wash
  if(inMatrix){
    var mAlpha=Math.min(0.82, state.matrix>4000?0.82:(state.matrix/4000)*0.82);
    ctx.save();ctx.fillStyle='rgba(0,20,0,'+mAlpha+')';ctx.fillRect(0,0,W,H);ctx.restore();
  }
  var matrixGreens=['#00ff41','#00cc33','#39ff14','#00ff99','#33ff66','#7fff00'];
  state.blocks.forEach(function(b){
    ctx.save();
    var col=inMatrix?matrixGreens[Math.floor(Math.random()*matrixGreens.length)]:b.color;

    // Isometric cube — all faces equal squares
    // Using standard isometric projection:
    // X axis goes right+down at 30deg, Y axis goes left+down at 30deg, Z axis goes straight up
    // s = side length of cube face
    var s = b.w * 0.6;
    var cx = b.x + b.w / 2;
    var cy = b.y + b.h / 2;

    // iso offsets: horizontal = s*cos(30) = s*0.866, vertical = s*sin(30) = s*0.5
    var hx = s * 0.866;
    var hy = s * 0.5;

    // 8 vertices of the cube in isometric projection
    // Top face (4 points)
    var A = {x: cx,      y: cy - s};        // top apex
    var B = {x: cx + hx, y: cy - s + hy};   // top right
    var C = {x: cx,      y: cy - s + hy*2}; // top centre (where faces meet at top)
    var D = {x: cx - hx, y: cy - s + hy};   // top left

    // Bottom of each vertical face
    var E = {x: cx + hx, y: cy + hy};       // front right bottom
    var F = {x: cx,      y: cy + hy*2};     // front bottom centre
    var G = {x: cx - hx, y: cy + hy};       // front left bottom

    function drawFace(pts, grad, stroke){
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for(var i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.closePath();
      ctx.fillStyle=grad; ctx.fill();
      ctx.strokeStyle=stroke; ctx.lineWidth=0.7; ctx.stroke();
    }

    // TOP face: A B C D
    ctx.shadowColor=col; ctx.shadowBlur=inMatrix?18:10;
    var tg=ctx.createLinearGradient(cx,A.y,cx,C.y);
    tg.addColorStop(0,col+'ff'); tg.addColorStop(1,col+'dd');
    drawFace([A,B,C,D], tg, col);

    // RIGHT face: B E F C
    ctx.shadowBlur=inMatrix?12:6;
    var rg=ctx.createLinearGradient(B.x,B.y,F.x,F.y);
    rg.addColorStop(0,col+'99'); rg.addColorStop(1,col+'33');
    drawFace([B,E,F,C], rg, col+'88');

    // LEFT face: D C F G
    ctx.shadowBlur=inMatrix?8:4;
    var lg=ctx.createLinearGradient(D.x,D.y,G.x,G.y);
    lg.addColorStop(0,col+'77'); lg.addColorStop(1,col+'22');
    drawFace([D,C,F,G], lg, col+'66');

    ctx.shadowBlur=0;

    // Glowing top edges
    ctx.shadowColor=col; ctx.shadowBlur=inMatrix?24:16;
    ctx.strokeStyle=inMatrix?'#00ff41':'#ffffffbb';
    ctx.lineWidth=inMatrix?1.8:1.2;
    ctx.beginPath();
    ctx.moveTo(A.x,A.y); ctx.lineTo(B.x,B.y);
    ctx.lineTo(C.x,C.y); ctx.lineTo(D.x,D.y);
    ctx.lineTo(A.x,A.y);
    ctx.stroke();
    ctx.shadowBlur=0;

    // High TX danger glow
    if(b.tx>160){
      ctx.shadowColor='#ff4444'; ctx.shadowBlur=24;
      ctx.strokeStyle='rgba(255,68,68,0.55)'; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(A.x,A.y-4);
      ctx.lineTo(B.x+3,B.y); ctx.lineTo(E.x+3,E.y);
      ctx.lineTo(F.x,F.y+4);
      ctx.lineTo(G.x-3,G.y); ctx.lineTo(D.x-3,D.y);
      ctx.lineTo(A.x,A.y-4);
      ctx.stroke();
      ctx.shadowBlur=0;
    }

    // Matrix char
    if(inMatrix){
      ctx.fillStyle='#00ff41'; ctx.font='bold 7px monospace';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      var chars='01アイウエカキ';
      ctx.fillText(chars[Math.floor(Math.random()*chars.length)], cx-hx*0.4, cy+hy*0.4);
    }
    ctx.restore();
  });
  state.powerups.forEach(function(pu){
    ctx.save();
    if(pu.type==='matrix'){
      var t=Date.now()/400;
      var pulse=0.7+Math.sin(t)*0.3;
      ctx.globalAlpha=pulse;
      // Outer glow ring
      ctx.strokeStyle='#00ff41';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(pu.x,pu.y,pu.w/2+4+Math.sin(t*2)*3,0,Math.PI*2);ctx.stroke();
      // Inner fill
      ctx.fillStyle='#001a00';ctx.beginPath();ctx.arc(pu.x,pu.y,pu.w/2,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#00ff41';ctx.beginPath();ctx.arc(pu.x,pu.y,pu.w/2,0,Math.PI*2);ctx.stroke();
      // Monad logo
      ctx.shadowColor='#00ff41';ctx.shadowBlur=12;
      if(monadLogoImg&&monadLogoImg.complete){
        var ls=pu.w*0.65;
        ctx.drawImage(monadLogoImg,pu.x-ls/2,pu.y-ls/2,ls,ls);
      }
      ctx.shadowBlur=0;
    } else {
      var t2=Date.now()/400;
      var alpha2=0.88+Math.sin(t2)*0.12;
      ctx.globalAlpha=alpha2;
      ctx.shadowColor=pu.color;ctx.shadowBlur=10+Math.sin(t2*2)*4;
      ctx.strokeStyle=pu.color;ctx.lineWidth=2.5;
      ctx.fillStyle=pu.color+'22';
      var s=pu.w*0.38; // icon half-size
      var px=pu.x,py=pu.y;

      if(pu.type==='shield'){
        // Monad-style shield: rounded diamond/kite outline
        ctx.beginPath();
        ctx.moveTo(px, py-s*1.1);
        ctx.bezierCurveTo(px+s*0.6,py-s*0.6, px+s,py, px,py+s*1.1);
        ctx.bezierCurveTo(px-s,py, px-s*0.6,py-s*0.6, px,py-s*1.1);
        ctx.fill();ctx.stroke();
        // Inner notch
        ctx.beginPath();
        ctx.moveTo(px,py-s*0.45);
        ctx.bezierCurveTo(px+s*0.28,py-s*0.1, px+s*0.4,py+s*0.2, px,py+s*0.55);
        ctx.bezierCurveTo(px-s*0.4,py+s*0.2, px-s*0.28,py-s*0.1, px,py-s*0.45);
        ctx.stroke();

      } else if(pu.type==='zap'){
        // Lightning bolt — angular, like Monad's sharp corners
        ctx.beginPath();
        ctx.moveTo(px+s*0.2, py-s*1.1);
        ctx.lineTo(px-s*0.15, py-s*0.05);
        ctx.lineTo(px+s*0.25, py-s*0.05);
        ctx.lineTo(px-s*0.2, py+s*1.1);
        ctx.lineTo(px+s*0.15, py+s*0.1);
        ctx.lineTo(px-s*0.2, py+s*0.1);
        ctx.closePath();
        ctx.fill();ctx.stroke();

      } else if(pu.type==='shrink'){
        // Four inward-pointing arrows forming a compress symbol
        ctx.lineWidth=2;
        var arr=s*0.55;
        // Top-left arrow pointing inward
        [[1,1],[-1,1],[1,-1],[-1,-1]].forEach(function(d){
          var dx=d[0],dy=d[1];
          ctx.beginPath();
          ctx.moveTo(px+dx*arr,py+dy*arr);
          ctx.lineTo(px+dx*s*0.9,py+dy*s*0.25);
          ctx.moveTo(px+dx*arr,py+dy*arr);
          ctx.lineTo(px+dx*s*0.25,py+dy*s*0.9);
          ctx.stroke();
        });
        // Centre dot
        ctx.beginPath();ctx.arc(px,py,s*0.18,0,Math.PI*2);
        ctx.fill();ctx.stroke();

      } else if(pu.type==='repel'){
        // Two outward curved arrows — repel/magnet style
        ctx.lineWidth=2.5;
        // Left arrow pointing left
        ctx.beginPath();
        ctx.moveTo(px-s*0.2,py);
        ctx.lineTo(px-s,py);
        ctx.moveTo(px-s*0.75,py-s*0.3);
        ctx.lineTo(px-s,py);
        ctx.lineTo(px-s*0.75,py+s*0.3);
        ctx.stroke();
        // Right arrow pointing right
        ctx.beginPath();
        ctx.moveTo(px+s*0.2,py);
        ctx.lineTo(px+s,py);
        ctx.moveTo(px+s*0.75,py-s*0.3);
        ctx.lineTo(px+s,py);
        ctx.lineTo(px+s*0.75,py+s*0.3);
        ctx.stroke();
        // Centre repel lines
        for(var ri=-1;ri<=1;ri++){
          ctx.globalAlpha=alpha2*(0.4+Math.abs(ri)*0.3);
          ctx.beginPath();
          ctx.moveTo(px+ri*s*0.12,py-s*0.5);
          ctx.lineTo(px+ri*s*0.12,py+s*0.5);
          ctx.stroke();
        }
        ctx.globalAlpha=alpha2;
      }
      ctx.shadowBlur=0;
    }
    ctx.restore();
  });
  state.particles.forEach(function(p){
    ctx.save();ctx.globalAlpha=p.life/700;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*(p.life/700),0,Math.PI*2);ctx.fill();ctx.restore();
  });
  if(inMatrix&&state.rainCols&&state.rainCols.length){
    var mAlpha2=Math.min(0.9,state.matrix/1000);
    ctx.save();ctx.font='bold 13px monospace';ctx.textAlign='center';
    state.rainCols.forEach(function(col){
      col.trail.forEach(function(t,ti){
        var fade=(ti+1)/col.trail.length;
        ctx.globalAlpha=fade*mAlpha2*(ti===col.trail.length-1?1:0.65);
        ctx.fillStyle=ti===col.trail.length-1?'#ccffcc':'#00ff41';
        ctx.shadowColor='#00ff41';ctx.shadowBlur=ti===col.trail.length-1?8:0;
        ctx.fillText(t.ch,col.x,t.y);
      });
    });
    ctx.shadowBlur=0;ctx.restore();
  }
  // Draw bullets
  state.bullets.forEach(function(blt){
    ctx.save();
    var col=inMatrix?'#00ff41':'#ffffff';
    ctx.shadowColor=col; ctx.shadowBlur=12;
    // Bullet body
    ctx.fillStyle=col;
    ctx.fillRect(blt.x-blt.w/2, blt.y, blt.w, blt.h);
    // Bright tip
    ctx.fillStyle='#ffffff';
    ctx.fillRect(blt.x-blt.w/2+1, blt.y, blt.w-2, 4);
    // Trail
    ctx.globalAlpha=0.3;
    ctx.fillStyle=col;
    ctx.fillRect(blt.x-blt.w/2+1, blt.y+blt.h, blt.w-2, 8);
    ctx.shadowBlur=0;
    ctx.restore();
  });

  state.textPops.forEach(function(t){
    ctx.save();
    var alpha=Math.min(1,t.life/600);
    var scale=0.5+0.5*(1-(t.life/t.maxLife));
    ctx.globalAlpha=alpha;
    ctx.font='bold '+(t.size*scale)+'px "Press Start 2P",monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=t.color;
    ctx.shadowColor=t.color;ctx.shadowBlur=12;
    ctx.fillText(t.text,t.x,t.y);
    ctx.restore();
  });
  var pw=state.player.w,ph=state.player.h,px=state.player.x,py=state.player.y;
  ctx.save();
  if(state.player.iframes>0&&Math.floor(state.player.iframes/110)%2===0)ctx.globalAlpha=0.28;
  if(state.activePU.shield>0){
    ctx.save();ctx.globalAlpha=0.22+Math.sin(Date.now()/180)*0.1;
    ctx.strokeStyle='#06b6d4';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(px+pw/2,py+ph/2,pw/2+10,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
  var cid=CHARS[state.selectedChar].id;
  var img=charImgs[cid];
  if(img&&img.complete&&img.naturalWidth>0){
    // Preserve natural aspect ratio — fit within pw x ph box, centred
    var iw=img.naturalWidth,ih=img.naturalHeight;
    var scale=Math.min(pw/iw,ph/ih);
    var dw=iw*scale,dh=ih*scale;
    var ox=px+(pw-dw)/2,oy=py+(ph-dh)/2;
    ctx.drawImage(img,ox,oy,dw,dh);
  }
  else{ctx.fillStyle='#a78bfa';ctx.fillRect(px,py,pw,ph);}
  ctx.restore();
  if(state.zapFlash>0){
    var alpha=state.zapFlash/350;
    ctx.save();
    var g2=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
    g2.addColorStop(0,'rgba(255,255,180,'+alpha*0.95+')');
    g2.addColorStop(0.3,'rgba(255,180,0,'+alpha*0.7+')');
    g2.addColorStop(0.7,'rgba(255,80,0,'+alpha*0.4+')');
    g2.addColorStop(1,'rgba(80,0,200,'+alpha*0.15+')');
    ctx.fillStyle=g2;
    ctx.fillRect(0,0,W,H);
    // energy rings
    for(var ri=0;ri<4;ri++){
      var r=((1-alpha)+ri*0.18)*Math.max(W,H)*0.8;
      ctx.beginPath();ctx.arc(W/2,H/2,r,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,100,'+(alpha*(0.9-ri*0.2))+')';
      ctx.lineWidth=6-ri*1.2;ctx.stroke();
    }
    ctx.restore();
  }
}

function saveScoreLS(name,score){
  try{
    var raw=localStorage.getItem('monad_lb');
    var lb=raw?JSON.parse(raw):[];
    var idx=-1;
    for(var i=0;i<lb.length;i++){if(lb[i].name===name){idx=i;break;}}
    if(idx>=0){if(lb[idx].score<score)lb[idx].score=score;}
    else lb.push({name:name,score:score});
    lb.sort(function(a,b){return b.score-a.score;});

  }catch(e){return[];}

function initAudio(){

// --- Oscillator helpers ---
function playNote(freq, type, start, dur, vol, pan){
  if(!actx||musicMuted) return;
  var osc=actx.createOscillator();
  var gain=actx.createGain();
  var panner=actx.createStereoPanner();
  osc.type=type||'square';
  osc.frequency.setValueAtTime(freq, start);
  gain.gain.setValueAtTime(vol||0.3, start);
  gain.gain.exponentialRampToValueAtTime(0.001, start+dur);
  panner.pan.value=pan||0;
  osc.connect(gain);gain.connect(panner);panner.connect(masterGain);
  osc.start(start);osc.stop(start+dur+0.05);
  musicNodes.push(osc);
}

function playDrum(freq, start, dur, vol){
  if(!actx||musicMuted) return;
  var osc=actx.createOscillator();
  var gain=actx.createGain();
  var noise=actx.createOscillator();
  osc.type='sawtooth';
  osc.frequency.setValueAtTime(freq,start);
  osc.frequency.exponentialRampToValueAtTime(freq*0.1,start+dur);
  gain.gain.setValueAtTime(vol||0.4,start);
  gain.gain.exponentialRampToValueAtTime(0.001,start+dur);
  osc.connect(gain);gain.connect(masterGain);
  osc.start(start);osc.stop(start+dur+0.05);
}

  [NOTES.Bb3,0.25],[NOTES.REST,0.125],[NOTES.A3,0.125],
  [NOTES.G3,0.25],[NOTES.REST,0.25],
  [NOTES.D3,0.25],[NOTES.REST,0.125],[NOTES.D3,0.0625],[NOTES.REST,0.0625],
  [NOTES.A3,0.5]
];

function scheduleLoop(noteArr, type, volMult, panVal, speed, bassArr){
  if(!actx||musicMuted) return;
  var t=actx.currentTime+0.05;

  function playMelody(){
    if(musicMuted) return;
    var pt=t;
    noteArr.forEach(function(n){
      if(n[0]>0) playNote(n[0],type,pt,n[1]*speed*0.95,0.2*volMult,panVal||0);
      pt+=n[1]*speed;
    });
    // Bass
    if(bassArr){
      var bt=t;
      bassArr.forEach(function(n){
        if(n[0]>0) playNote(n[0],'square',bt,n[1]*speed*2*0.9,0.12*volMult,0);
        bt+=n[1]*speed*2;
      });
    }
    // Drums — deep kick + snare pattern
    var dt=t;
    var barLen=0;
    noteArr.forEach(function(n){barLen+=n[1]*speed;});
    var beat=barLen/8;
    // Kick on 1 and 3
    playDrum(55,dt+beat*0,0.12,0.5*volMult);
    playDrum(55,dt+beat*4,0.12,0.5*volMult);
    // Snare on 2 and 4
    playDrum(180,dt+beat*2,0.07,0.3*volMult);
    playDrum(180,dt+beat*6,0.07,0.3*volMult);
    // Hi-hat 8ths
    for(var di=0;di<8;di++){
      playDrum(400,dt+beat*di,0.025,0.12*volMult);
    }
    var loopDur=barLen;
    t+=loopDur;
    var tid=setTimeout(playMelody, loopDur*1000-50);
    scheduledTimeouts.push(tid);
  }
  playMelody();
}

function stopAllMusic(){
  clearTimeouts();
  musicNodes.forEach(function(n){try{n.stop();}catch(e){}});
  musicNodes=[];
  currentTrack=null;
}

function startMainMusic(){
  if(currentTrack==='main') return;
  stopAllMusic();
  currentTrack='main';
  var level=state?state.level:1;
  var speed=Math.max(0.4, 1.0-((level-1)*0.07));
  scheduleLoop(MELODY,'square',1,0,speed,BASS);
}

function startMatrixMusic(){
  if(currentTrack==='matrix') return;
  stopAllMusic();
  currentTrack='matrix';
  scheduleLoop(MATRIX_NOTES,'sine',1.1,0,0.55,MATRIX_BASS);
}

function updateMusicSpeed(){
  if(currentTrack==='main'){
    stopAllMusic();
    currentTrack=null;
    startMainMusic();
  }
}

// --- Sound Effects ---
function sfxHit(){
  if(!actx||musicMuted) return;
  var o=actx.createOscillator(),g=actx.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(220,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(55,actx.currentTime+0.15);
  g.gain.setValueAtTime(0.4,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.15);
  o.connect(g);g.connect(masterGain);
  o.start();o.stop(actx.currentTime+0.2);
}

function sfxPowerup(){
  if(!actx||musicMuted) return;
  var freqs=[523,659,784,1047];
  freqs.forEach(function(f,i){
    var o=actx.createOscillator(),g=actx.createGain();
    o.type='square';o.frequency.value=f;
    var t=actx.currentTime+i*0.07;
    g.gain.setValueAtTime(0.25,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.connect(g);g.connect(masterGain);
    o.start(t);o.stop(t+0.12);
  });
}

function sfxLevelUp(){
  if(!actx||musicMuted) return;
  var seq=[[523,0],[659,0.1],[784,0.2],[1047,0.3],[1319,0.4]];
  seq.forEach(function(n){
    var o=actx.createOscillator(),g=actx.createGain();
    o.type='square';o.frequency.value=n[0];
    var t=actx.currentTime+n[1];
    g.gain.setValueAtTime(0.3,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    o.connect(g);g.connect(masterGain);
    o.start(t);o.stop(t+0.2);
  });
}

function sfxGameOver(){
  if(!actx||musicMuted) return;
  var seq=[[440,0],[349,0.15],[311,0.3],[220,0.45]];
  seq.forEach(function(n){
    var o=actx.createOscillator(),g=actx.createGain();
    o.type='sawtooth';o.frequency.value=n[0];
    var t=actx.currentTime+n[1];
    g.gain.setValueAtTime(0.3,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    o.connect(g);g.connect(masterGain);
    o.start(t);o.stop(t+0.2);
  });
}

function sfxZap(){
  if(!actx||musicMuted) return;
  // White noise burst + rising tone
  var bufSize=actx.sampleRate*0.3;
  var buf=actx.createBuffer(1,bufSize,actx.sampleRate);
  var data=buf.getChannelData(0);
  for(var i=0;i<bufSize;i++) data[i]=(Math.random()*2-1)*0.5;
  var src=actx.createBufferSource(),g=actx.createGain(),filt=actx.createBiquadFilter();
  filt.type='bandpass';filt.frequency.value=800;
  g.gain.setValueAtTime(0.5,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.3);
  src.buffer=buf;src.connect(filt);filt.connect(g);g.connect(masterGain);
  src.start();src.stop(actx.currentTime+0.35);
  // Rising sweep
  var o=actx.createOscillator(),g2=actx.createGain();
  o.type='square';
  o.frequency.setValueAtTime(200,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(2000,actx.currentTime+0.3);
  g2.gain.setValueAtTime(0.3,actx.currentTime);
  g2.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.3);
  o.connect(g2);g2.connect(masterGain);
  o.start();o.stop(actx.currentTime+0.35);
}

function sfxMatrix(){
  if(!actx||musicMuted) return;
  // Deep descending sweep
  var o=actx.createOscillator(),g=actx.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(1200,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(80,actx.currentTime+0.6);
  g.gain.setValueAtTime(0.4,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.6);
  o.connect(g);g.connect(masterGain);
  o.start();o.stop(actx.currentTime+0.65);
}

function toggleMute(){
  musicMuted=!musicMuted;
  var btn=document.getElementById('mute-btn');
  if(musicMuted){
    stopAllMusic();
    if(btn) btn.textContent='♪ OFF';
  } else {
    if(btn) btn.textContent='♪ ON';
    if(state&&state.running){
      if(state.matrix>0) startMatrixMusic();
      else startMainMusic();
    }
  }
}
