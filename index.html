<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monad Block Dodger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080818;font-family:'Press Start 2P',monospace;overflow:hidden;user-select:none}
#wrap{position:relative;width:100vw;height:100vh;overflow:hidden}
#bgcanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
#gc{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}
#hud{position:absolute;top:0;left:0;width:100%;z-index:5;background:rgba(8,8,24,0.88);border-bottom:2px solid #7c3aed;display:flex;justify-content:space-between;align-items:center;padding:8px 14px;gap:8px;flex-wrap:wrap}
.hud-block{display:flex;flex-direction:column;align-items:center;gap:2px}
.hud-label{color:#4c1d95;font-size:5px}
.hud-val{color:#a78bfa;font-size:9px}
#chain-dot{width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block;animation:blink 1s infinite;margin-right:4px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,8,24,.93);overflow-y:auto;padding:20px 0}
#overlay h1{color:#a78bfa;font-size:13px;margin-bottom:12px;text-align:center;line-height:1.9;text-shadow:0 0 20px #7c3aed}
#overlay p{color:#6d28d9;font-size:6px;text-align:center;line-height:2;margin-bottom:5px;max-width:300px}
.big-btn{background:#7c3aed;color:#fff;border:2px solid #a78bfa;font-family:'Press Start 2P',monospace;font-size:9px;padding:12px 22px;cursor:pointer;margin-top:10px;display:block;width:220px;text-align:center}
.big-btn:hover{background:#6d28d9}
#char-select{display:flex;gap:12px;margin:12px 0;justify-content:center;flex-wrap:wrap}
.char-card{border:2px solid #4c1d95;padding:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(124,58,237,.1);transition:border-color .2s;min-width:64px}
.char-card img{width:50px;height:50px;object-fit:contain}
.char-card span{font-size:5px;color:#a78bfa;text-align:center}
.char-card.locked{opacity:.4;cursor:not-allowed}
.char-card.active{border-color:#a78bfa;background:rgba(124,58,237,.35)}
#leaderboard-panel{position:absolute;top:0;right:0;width:175px;height:100%;z-index:6;background:rgba(8,8,24,.95);border-left:2px solid #7c3aed;padding:10px 8px;overflow-y:auto;transform:translateX(100%);transition:transform .3s}
#leaderboard-panel.open{transform:translateX(0)}
#lb-title{color:#a78bfa;font-size:7px;margin-bottom:10px;text-align:center;padding-top:52px}
.lb-entry{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #1e1040;font-size:6px}
.lb-rank{color:#4c1d95;width:14px}
.lb-name{color:#c4b5fd;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px}
.lb-score{color:#10b981}
#lb-toggle{position:absolute;top:50%;right:0;z-index:7;transform:translateY(-50%);background:#7c3aed;border:none;color:#fff;font-family:'Press Start 2P',monospace;font-size:6px;padding:6px 4px;cursor:pointer;writing-mode:vertical-rl}
#lb-toggle.open{right:175px}
#powerup-bar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:8px}
.pu-slot{width:42px;height:42px;border:2px solid #4c1d95;background:rgba(8,8,24,.85);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;position:relative}
.pu-slot .pu-icon{font-size:13px}
.pu-slot .pu-label{font-size:4px;color:#7c3aed}
.pu-slot.active{border-color:#a78bfa;background:rgba(124,58,237,.3)}
.pu-timer{position:absolute;bottom:0;left:0;height:3px;background:#a78bfa;transition:width .1s linear}
#level-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15;color:#f59e0b;font-size:16px;text-align:center;pointer-events:none;opacity:0;transition:opacity .4s;text-shadow:0 0 24px #f59e0b}
#name-input-wrap{display:flex;gap:8px;align-items:center;margin-top:8px}
#player-name{background:rgba(124,58,237,.2);border:2px solid #7c3aed;color:#a78bfa;font-family:'Press Start 2P',monospace;font-size:7px;padding:8px;width:170px;outline:none}
#scanlines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);z-index:10}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="bgcanvas"></canvas>
  <canvas id="gc"></canvas>
  <div id="scanlines"></div>

  <div id="hud">
    <div class="hud-block"><div class="hud-label">SCORE</div><div class="hud-val" id="hud-score">0</div></div>
    <div class="hud-block"><div class="hud-label">BEST</div><div class="hud-val" id="hud-best">0</div></div>
    <div class="hud-block"><div class="hud-label">LEVEL</div><div class="hud-val" id="hud-level">1</div></div>
    <div class="hud-block"><div class="hud-label">LIVES</div><div class="hud-val" id="hud-lives">♥♥♥</div></div>
    <div class="hud-block">
      <div class="hud-val"><span id="chain-dot"></span><span id="hud-block">—</span></div>
      <div class="hud-label">MONAD BLOCK</div>
    </div>
    <div id="matrix-hud" style="display:none;color:#00ff41;font-size:8px;text-shadow:0 0 8px #00ff41;animation:blink 0.5s infinite"></div>
    <div class="hud-block" id="hud-char-wrap" style="cursor:pointer" onclick="toggleCharPanel()">
      <div class="hud-label">CHARACTER</div>
      <div class="hud-val" id="hud-char-name" style="font-size:6px">SALMONAD</div>
    </div>
  </div>
  <div id="char-panel" style="position:absolute;top:52px;right:0;z-index:15;background:rgba(8,8,24,.97);border:2px solid #7c3aed;border-top:none;padding:10px 12px;display:none;flex-direction:column;align-items:center;gap:8px">
    <div style="color:#a78bfa;font-size:6px;margin-bottom:4px">SWITCH CHARACTER</div>
    <div id="char-panel-inner" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center"></div>
    <button onclick="toggleCharPanel()" style="background:transparent;border:1px solid #4c1d95;color:#6d28d9;font-family:'Press Start 2P',monospace;font-size:5px;padding:4px 10px;cursor:pointer;margin-top:4px">CLOSE</button>
  </div>

  <div id="powerup-bar">
    <div class="pu-slot" id="pu-shield"><div class="pu-icon">🛡</div><div class="pu-label">SHIELD</div><div class="pu-timer" id="pt-shield" style="width:0%"></div></div>
    <div class="pu-slot" id="pu-zap"><div class="pu-icon">⚡</div><div class="pu-label">ZAP</div><div class="pu-timer" id="pt-zap" style="width:0%"></div></div>
    <div class="pu-slot" id="pu-shrink"><div class="pu-icon">◈</div><div class="pu-label">SHRINK</div><div class="pu-timer" id="pt-shrink" style="width:0%"></div></div>
    <div class="pu-slot" id="pu-repel"><div class="pu-icon">↔</div><div class="pu-label">REPEL</div><div class="pu-timer" id="pt-repel" style="width:0%"></div></div>
  </div>

  <div id="level-banner">LEVEL UP!</div>

  <button id="lb-toggle">SCORES</button>
  <div id="leaderboard-panel">
    <div id="lb-title">TOP 10</div>
    <div id="lb-entries"></div>
  </div>

  <div id="overlay">
    <h1>MONAD<br>BLOCK DODGER</h1>
    <p>Dodge falling blocks from Monad mainnet · Live data every 400ms</p>
    <div id="name-input-wrap">
      <input id="player-name" maxlength="10" placeholder="YOUR NAME" />
    </div>
    <p style="color:#4c1d95;font-size:5px;margin-top:6px">Choose your character:</p>
    <div id="char-select"></div>
    <p style="color:#6d28d9;font-size:5px">Arrow keys / WASD · New chars unlock each level</p>
    <button class="big-btn" id="start-btn">INSERT COIN</button>
  </div>
</div>

var PUTYPE=['shield','zap','shrink','repel'];
var PUDUR=6000;
var RPC='https://monad-mainnet.drpc.org';
var gc=document.getElementById('gc'),ctx=gc.getContext('2d');
var bgc=document.getElementById('bgcanvas'),bctx=bgc.getContext('2d');
var W,H,HUD_H=52;
var state=null,animId=null,lastTime=0,simTimer=0,bestScore=0;

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  gc.width=W;gc.height=H;bgc.width=W;bgc.height=H;
  if(state){state.player.y=H-90;genStars();}
}

function makeState(){
  return{running:false,score:0,lives:3,level:1,
    blocks:[],particles:[],textPops:[],powerups:[],
    activePU:{shield:0,zap:0,shrink:0,repel:0},
    player:{x:W/2-30,y:H-90,w:58,h:58,vx:0,vy:0,iframes:0},
    keys:{},blockNum:null,txCount:0,rpcOk:false,
    stars:[],levelTimer:0,score100:0,gameOver:false,zapFlash:0,zapEffect:0,matrix:0,matrixTimer:0,matrixSpawn:0,rainCols:[],
    puTimer:0,nextPU:5000,selectedChar:0,unlocked:1};
}

var charImgs={};
CHARS.forEach(function(c){
  var img=new Image();img.src='data:image/png;base64,'+c.b64;charImgs[c.id]=img;
});

function genStars(){
  if(!state)return;state.stars=[];
  for(var i=0;i<80;i++)state.stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.4+0.3,b:Math.random()});
}

function drawBg(){
  bctx.fillStyle='#080818';bctx.fillRect(0,0,W,H);
  if(!state)return;
  state.stars.forEach(function(s){
    bctx.globalAlpha=0.25+s.b*0.5;bctx.fillStyle='#a78bfa';
    bctx.beginPath();bctx.arc(s.x,s.y,s.s,0,Math.PI*2);bctx.fill();
  });
  bctx.globalAlpha=1;
}

var BCOLS=['#3b0764','#4c1d95','#5b21b6','#6d28d9','#7c3aed','#8b5cf6','#a78bfa','#c4b5fd'];

function spawnBlock(tx,bn){
  var bw=18+Math.random()*22+state.level*1.5;
  var spd=(1.8+state.level*1.4+Math.min(tx/200,3.5));
  state.blocks.push({x:Math.random()*(W-bw),y:HUD_H-28,w:bw,h:12+Math.random()*10,speed:spd,
    color:BCOLS[Math.floor(Math.random()*BCOLS.length)],tx:tx,bn:bn,vx:0});
}

function spawnPU(){
  var types=['shield','zap','shrink','repel'];
  var colors={shield:'#06b6d4',zap:'#ffff00',shrink:'#ec4899',repel:'#10b981'};
  var t=types[Math.floor(Math.random()*4)];
  state.powerups.push({x:30+Math.random()*(W-60),y:HUD_H,w:24,h:24,type:t,color:colors[t],speed:3.5});
}

function spawnMatrix(){
  state.powerups.push({x:30+Math.random()*(W-60),y:HUD_H,w:30,h:30,type:'matrix',color:'#00ff41',speed:3.0,pulse:0});
}

function activatePU(t){
  state.activePU[t]=PUDUR;
  document.getElementById('pu-'+t).classList.add('active');
}

function updatePU(dt){
  PUTYPE.forEach(function(t){
    if(state.activePU[t]>0){
      state.activePU[t]=Math.max(0,state.activePU[t]-dt);
      document.getElementById('pt-'+t).style.width=(state.activePU[t]/PUDUR*100)+'%';
      if(state.activePU[t]<=0){
        document.getElementById('pu-'+t).classList.remove('active');
        document.getElementById('pt-'+t).style.width='0%';
      }
    }
  });
  state.player.w=state.activePU.shrink>0?28:58;
  state.player.h=state.player.w;
}

function hit(px,py,pw,ph,bx,by,bw,bh){
  var m=state.activePU.shrink>0?10:5;
  return px+m<bx+bw&&px+pw-m>bx&&py+m<by+bh&&py+ph-m>by;
}

function particles(x,y,col,n){
  for(var i=0;i<n;i++)state.particles.push({x:x,y:y,vx:(Math.random()-0.5)*6,vy:(Math.random()-2.5)*3.5,life:700,color:col,size:4+Math.random()*3});
}

async function pollChain(){
  try{
    var r=await fetch(RPC,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_getBlockByNumber',params:['latest',false]})});
    var d=await r.json();
    if(d.result){
      var bn=parseInt(d.result.number,16);
      var tx=d.result.transactions?d.result.transactions.length:0;
      if(state&&state.running&&state.blockNum!==bn){
        state.blockNum=bn;state.txCount=tx;state.rpcOk=true;
        document.getElementById('chain-dot').style.background='#10b981';
        document.getElementById('hud-block').textContent='#'+bn.toLocaleString();
        var n=Math.min(Math.max(1,Math.floor(tx/60)+Math.floor(state.level/2)),8);
        var gap=Math.max(30,90-state.level*8);
        for(var i=0;i<n;i++)(function(ii){setTimeout(function(){if(state&&state.running)spawnBlock(tx,bn);},ii*gap);})(i);
      }
    }
  }catch(e){
    document.getElementById('chain-dot').style.background='#ef4444';
    if(state&&state.running){var stx=Math.floor(Math.random()*200)+30;spawnBlock(stx,simTimer);}
  }
}

function doLevelUp(){
  state.level++;state.unlocked=Math.min(CHARS.length,state.level);
  document.getElementById('hud-level').textContent=state.level;
  if(state.unlocked<=CHARS.length) document.getElementById('level-banner').style.color='#a78bfa';
  var b=document.getElementById('level-banner');
  b.textContent='LEVEL '+state.level+'!';b.style.opacity='1';
  setTimeout(function(){b.style.opacity='0';},1800);
  buildCharSelect();
}

function loop(ts){
  if(!state||!state.running)return;
  var dt=Math.min(ts-lastTime,50);lastTime=ts;simTimer+=dt;
  state.score100+=dt;state.levelTimer+=dt;state.puTimer+=dt;
  var pts=Math.floor(state.score100/100);
  if(pts>0){state.score+=pts;state.score100-=pts*100;}
  if(state.levelTimer>10000){doLevelUp();state.levelTimer=0;}
  if(state.puTimer>state.nextPU){spawnPU();state.puTimer=0;state.nextPU=4000+Math.random()*5000;}
  state.matrixSpawn+=dt;
  if(state.matrixSpawn>35000+Math.random()*20000&&state.matrix===0){spawnMatrix();state.matrixSpawn=0;}
  updatePU(dt);
  if(state.zapFlash>0)state.zapFlash=Math.max(0,state.zapFlash-dt);
  if(state.zapEffect>0)state.zapEffect=Math.max(0,state.zapEffect-dt/400);
  if(state.player.iframes>0)state.player.iframes-=dt;
  if(state.matrix>0){
    // AUTO-DODGE AI: find the block that will hit us soonest and flee it
    state.matrix=Math.max(0,state.matrix-dt);
    state.player.iframes=300;
    var bestThreat=null,bestScore2=0;
    var px2=state.player.x+state.player.w/2,py2=state.player.y+state.player.h/2;
    state.blocks.forEach(function(b){
      var bx=b.x+b.w/2,by=b.y+b.h/2;
      var dist=Math.sqrt((bx-px2)*(bx-px2)+(by-py2)*(by-py2));
      var threat=(1/(dist+1))*b.speed*10;
      if(threat>bestScore2){bestScore2=threat;bestThreat=b;}
    });
    var aiSpd=9;
    var midX=W/2, midY=H/2;
    var toCx=midX-px2, toCy=midY-py2;
    var toCmag=Math.sqrt(toCx*toCx+toCy*toCy)||1;
    if(bestThreat){
      var bx=bestThreat.x+bestThreat.w/2,by=bestThreat.y+bestThreat.h/2;
      var dx=px2-bx,dy=py2-by;
      var mag=Math.sqrt(dx*dx+dy*dy)||1;
      // dodge away from threat, but blend in a pull back to centre
      state.player.vx=dx/mag*aiSpd + (toCx/toCmag)*2.5;
      state.player.vy=dy/mag*aiSpd + (toCy/toCmag)*2.5;
    } else {
      // no threat — smoothly glide back to centre
      state.player.vx=toCx/toCmag*aiSpd*0.6;
      state.player.vy=toCy/toCmag*aiSpd*0.6;
    }
  } else {
    var spd=3.2+state.level*0.25;
    var diag=(state.keys['ArrowLeft']||state.keys['a'])&&(state.keys['ArrowUp']||state.keys['w'])||
             (state.keys['ArrowLeft']||state.keys['a'])&&(state.keys['ArrowDown']||state.keys['s'])||
             (state.keys['ArrowRight']||state.keys['d'])&&(state.keys['ArrowUp']||state.keys['w'])||
             (state.keys['ArrowRight']||state.keys['d'])&&(state.keys['ArrowDown']||state.keys['s']);
    var ms=diag?spd*0.707:spd;
    if(state.keys['ArrowLeft']||state.keys['a'])state.player.vx=-ms;
    else if(state.keys['ArrowRight']||state.keys['d'])state.player.vx=ms;
    else state.player.vx*=0.72;
    if(state.keys['ArrowUp']||state.keys['w'])state.player.vy=-ms;
    else if(state.keys['ArrowDown']||state.keys['s'])state.player.vy=ms;
    else state.player.vy*=0.72;
  }
  state.player.x=Math.max(0,Math.min(W-state.player.w,state.player.x+state.player.vx));
  if(state.matrix>0){
    var midClamp=H/2;
    state.player.y=Math.max(HUD_H+80,Math.min(midClamp+80,state.player.y+state.player.vy));
  } else {
    state.player.y=Math.max(HUD_H,Math.min(H-state.player.h,state.player.y+state.player.vy));
  }
  state.blocks=state.blocks.filter(function(b){
    b.y+=b.speed*(dt/16);
    if(state.activePU.repel>0){
      var cx=b.x+b.w/2,cy=b.y+b.h/2,px=state.player.x+state.player.w/2,py=state.player.y+state.player.h/2;
      var dx=cx-px,dy=cy-py,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<190){b.vx+=(dx/dist)*0.65;}
    }
    if(b.vx){b.x+=b.vx*(dt/16);b.vx*=0.9;}
    if(b.y>H+20||b.x<-b.w-20||b.x>W+20)return false;
    if(state.player.iframes<=0&&hit(state.player.x,state.player.y,state.player.w,state.player.h,b.x,b.y,b.w,b.h)){
      if(state.activePU.shield>0){
        state.activePU.shield=0;document.getElementById('pu-shield').classList.remove('active');
        document.getElementById('pt-shield').style.width='0%';
        particles(b.x+b.w/2,b.y+b.h/2,'#06b6d4',16);
      }else{
        state.lives--;state.player.iframes=1200;
        particles(state.player.x+state.player.w/2,state.player.y+state.player.h/2,'#ef4444',22);
        document.getElementById('hud-lives').textContent='♥'.repeat(state.lives)+'♡'.repeat(Math.max(0,3-state.lives));
        if(state.lives<=0){endGame();return false;}
      }
      return false;
    }
    return true;
  });

  state.powerups=state.powerups.filter(function(pu){
    pu.y+=pu.speed*(dt/16);if(pu.y>H)return false;
    if(hit(state.player.x,state.player.y,state.player.w,state.player.h,pu.x-pu.w/2,pu.y-pu.h/2,pu.w,pu.h)){
      if(pu.type==='zap'){triggerZap();}
      else if(pu.type==='matrix'){triggerMatrix();}
      else{activatePU(pu.type);}
      particles(pu.x,pu.y,pu.color,14);return false;
    }
    return true;
  });

  state.particles=state.particles.filter(function(p){
    p.x+=p.vx*(dt/16);p.y+=p.vy*(dt/16);p.vy+=0.14;p.life-=dt;return p.life>0;
  });
  // Rain column physics — updated in loop where dt is available
  if(state.matrix>0){
    if(!state.rainCols||state.rainCols.length===0){
      var nc=Math.floor(W/14);state.rainCols=[];
      for(var ri2=0;ri2<nc;ri2++) state.rainCols.push({x:ri2*14+7,y:Math.random()*H,speed:8+Math.random()*22,trail:[]});
    }
    var mc2='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホ01';
    state.rainCols.forEach(function(col){
      col.y+=col.speed*(dt/16);
      if(col.y>H+20){col.y=HUD_H;col.speed=8+Math.random()*22;col.trail=[];}
      col.trail.push({y:col.y,ch:mc2[Math.floor(Math.random()*mc2.length)]});
      if(col.trail.length>18)col.trail.shift();
    });
  } else {
    state.rainCols=[];
  }
  state.textPops=state.textPops.filter(function(t){
    t.y+=t.vy*(dt/16);t.vy*=0.97;t.life-=dt;return t.life>0;
  });

  if(state.score>bestScore)bestScore=state.score;
  document.getElementById('hud-score').textContent=state.score;
  document.getElementById('hud-best').textContent=bestScore;
  var matEl=document.getElementById('matrix-hud');
  if(matEl){
    if(state.matrix>0){
      matEl.style.display='block';
      matEl.textContent='MATRIX '+Math.ceil(state.matrix/1000)+'s';
    } else {
      matEl.style.display='none';
    }
  }
  drawFrame();
  animId=requestAnimationFrame(loop);
}

var puIcons={shield:'🛡',zap:'⚡',shrink:'◈',repel:'↔'};

function drawFrame(){
  ctx.clearRect(0,0,W,H);
  var inMatrix=state.matrix>0;
  // Matrix green background wash
  if(inMatrix){
    var mAlpha=Math.min(0.82, state.matrix>4000?0.82:(state.matrix/4000)*0.82);
    ctx.save();ctx.fillStyle='rgba(0,20,0,'+mAlpha+')';ctx.fillRect(0,0,W,H);ctx.restore();
  }
  var matrixGreens=['#00ff41','#00cc33','#39ff14','#00ff99','#33ff66','#7fff00'];
  state.blocks.forEach(function(b){
    ctx.save();
    var c1=inMatrix?matrixGreens[Math.floor(Math.random()*matrixGreens.length)]:b.color;
    var c2=inMatrix?matrixGreens[Math.floor(Math.random()*matrixGreens.length)]:b.color+'66';
    var g=ctx.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
    g.addColorStop(0,c1);g.addColorStop(1,c2);
    ctx.fillStyle=g;ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.strokeStyle=inMatrix?'rgba(0,255,65,0.5)':'rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.strokeRect(b.x,b.y,b.w,b.h);
    if(inMatrix){
      // Matrix rain char on block
      ctx.fillStyle='#00ff41';ctx.font='bold 8px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      var chars='01アイウエオカキ';
      ctx.fillText(chars[Math.floor(Math.random()*chars.length)],b.x+b.w/2,b.y+b.h/2);
    }
    ctx.restore();
  });
  state.powerups.forEach(function(pu){
    ctx.save();
    if(pu.type==='matrix'){
      var t=Date.now()/400;
      var pulse=0.7+Math.sin(t)*0.3;
      ctx.globalAlpha=pulse;
      // Outer glow ring
      ctx.strokeStyle='#00ff41';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(pu.x,pu.y,pu.w/2+4+Math.sin(t*2)*3,0,Math.PI*2);ctx.stroke();
      // Inner fill
      ctx.fillStyle='#001a00';ctx.beginPath();ctx.arc(pu.x,pu.y,pu.w/2,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#00ff41';ctx.beginPath();ctx.arc(pu.x,pu.y,pu.w/2,0,Math.PI*2);ctx.stroke();
      // > symbol
      ctx.fillStyle='#00ff41';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowColor='#00ff41';ctx.shadowBlur=10;
      ctx.fillText('>_',pu.x,pu.y);
    } else {
      ctx.globalAlpha=0.88+Math.sin(Date.now()/280)*0.12;
      ctx.fillStyle=pu.color+'33';ctx.strokeStyle=pu.color;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(pu.x,pu.y,pu.w/2,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#fff';ctx.fillText(puIcons[pu.type],pu.x,pu.y);
    }
    ctx.restore();
  });
  state.particles.forEach(function(p){
    ctx.save();ctx.globalAlpha=p.life/700;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*(p.life/700),0,Math.PI*2);ctx.fill();ctx.restore();
  });
  if(inMatrix&&state.rainCols&&state.rainCols.length){
    var mAlpha2=Math.min(0.9,state.matrix/1000);
    ctx.save();ctx.font='bold 13px monospace';ctx.textAlign='center';
    state.rainCols.forEach(function(col){
      col.trail.forEach(function(t,ti){
        var fade=(ti+1)/col.trail.length;
        ctx.globalAlpha=fade*mAlpha2*(ti===col.trail.length-1?1:0.65);
        ctx.fillStyle=ti===col.trail.length-1?'#ccffcc':'#00ff41';
        ctx.shadowColor='#00ff41';ctx.shadowBlur=ti===col.trail.length-1?8:0;
        ctx.fillText(t.ch,col.x,t.y);
      });
    });
    ctx.shadowBlur=0;ctx.restore();
  }
  state.textPops.forEach(function(t){
    ctx.save();
    var alpha=Math.min(1,t.life/600);
    var scale=0.5+0.5*(1-(t.life/t.maxLife));
    ctx.globalAlpha=alpha;
    ctx.font='bold '+(t.size*scale)+'px "Press Start 2P",monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=t.color;
    ctx.shadowColor=t.color;ctx.shadowBlur=12;
    ctx.fillText(t.text,t.x,t.y);
    ctx.restore();
  });
  var pw=state.player.w,ph=state.player.h,px=state.player.x,py=state.player.y;
  ctx.save();
  if(state.player.iframes>0&&Math.floor(state.player.iframes/110)%2===0)ctx.globalAlpha=0.28;
  if(state.activePU.shield>0){
    ctx.save();ctx.globalAlpha=0.22+Math.sin(Date.now()/180)*0.1;
    ctx.strokeStyle='#06b6d4';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(px+pw/2,py+ph/2,pw/2+10,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
  var cid=CHARS[state.selectedChar].id;
  var img=charImgs[cid];
  if(img&&img.complete&&img.naturalWidth>0){ctx.drawImage(img,px,py,pw,ph);}
  else{ctx.fillStyle='#a78bfa';ctx.fillRect(px,py,pw,ph);}
  ctx.restore();
  if(state.zapFlash>0){
    var alpha=state.zapFlash/350;
    ctx.save();
    var g2=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
    g2.addColorStop(0,'rgba(255,255,180,'+alpha*0.95+')');
    g2.addColorStop(0.3,'rgba(255,180,0,'+alpha*0.7+')');
    g2.addColorStop(0.7,'rgba(255,80,0,'+alpha*0.4+')');
    g2.addColorStop(1,'rgba(80,0,200,'+alpha*0.15+')');
    ctx.fillStyle=g2;
    ctx.fillRect(0,0,W,H);
    // energy rings
    for(var ri=0;ri<4;ri++){
      var r=((1-alpha)+ri*0.18)*Math.max(W,H)*0.8;
      ctx.beginPath();ctx.arc(W/2,H/2,r,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,100,'+(alpha*(0.9-ri*0.2))+')';
      ctx.lineWidth=6-ri*1.2;ctx.stroke();
    }
    ctx.restore();
  }
}

  try{

    var lb=raw?JSON.parse(raw):[];
    var idx=-1;
    for(var i=0;i<lb.length;i++){if(lb[i].name===name){idx=i;break;}}
    if(idx>=0){if(lb[idx].score<score)lb[idx].score=score;}
    else lb.push({name:name,score:score});
    lb.sort(function(a,b){return b.score-a.score;});
    if(lb.length>20)lb=lb.slice(0,20);
    localStorage.setItem('monad_lb',JSON.stringify(lb));
    localStorage.setItem('monad_name',name);
    return lb;
  }catch(e){return[];}
}

  if(entries&&entries.length){
    var lbWrap=document.createElement('div');
    lbWrap.style.cssText='width:240px;margin:8px auto;border:1px solid #4c1d95;padding:8px';
    lbWrap.innerHTML='<div style="color:#a78bfa;font-size:6px;margin-bottom:6px;text-align:center">LEADERBOARD</div>';
    entries.slice(0,8).forEach(function(e,i){
      var row=document.createElement('div');
      row.style.cssText='display:flex;justify-content:space-between;font-size:6px;padding:3px 0;border-bottom:1px solid #1e1040';
      row.innerHTML='<span style="color:#4c1d95;width:14px">'+(i+1)+'</span><span style="color:#c4b5fd;flex:1;overflow:hidden;padding:0 6px">'+e.name+'</span><span style="color:#10b981">'+e.score+'</span>';
      lbWrap.appendChild(row);
    });
    ov.appendChild(lbWrap);
  }
  var nw=document.createElement('div');
  nw.style.cssText='display:flex;gap:8px;align-items:center;margin-top:10px';
  var lbl=document.createElement('span');lbl.style.cssText='color:#4c1d95;font-size:5px';lbl.textContent='NAME:';
  var inp=document.createElement('input');
  inp.id='player-name';inp.maxLength=10;inp.placeholder='YOUR NAME';
  inp.value=localStorage.getItem('monad_name')||'';
  inp.style.cssText='background:rgba(124,58,237,.2);border:2px solid #7c3aed;color:#a78bfa;font-family:"Press Start 2P",monospace;font-size:7px;padding:8px;width:150px;outline:none';
  nw.appendChild(lbl);nw.appendChild(inp);ov.appendChild(nw);
  var cs=document.createElement('div');cs.id='char-select';ov.appendChild(cs);
  buildCharSelect(cs);
  var phint=document.createElement('p');phint.textContent='Arrow keys / WASD to move';ov.appendChild(phint);
  var btn=document.createElement('button');btn.className='big-btn';btn.textContent='PLAY AGAIN';
  btn.addEventListener('click',startGame);ov.appendChild(btn);
  ov.style.display='flex';
}

function loadLeaderboard(){
  var local=loadScoresLS();
  renderLB(local);
  // Try to refresh from Supabase
  loadScoresSB().then(function(entries){
    if(entries&&entries.length>0) renderLB(entries);
  });
  return Promise.resolve(local);
}

function renderLB(entries){
  var div=document.getElementById('lb-entries');div.innerHTML='';
  entries.slice(0,10).forEach(function(e,i){
    var row=document.createElement('div');row.className='lb-entry';
    row.innerHTML='<span class="lb-rank">'+(i+1)+'</span><span class="lb-name">'+e.name+'</span><span class="lb-score">'+e.score+'</span>';
    div.appendChild(row);
  });
}

function startGame(){
  var inp=document.getElementById('player-name');
  if(inp)localStorage.setItem('monad_name',inp.value||'ANON');
  state=makeState();
  var cards=document.querySelectorAll('.char-card');
  cards.forEach(function(c,i){if(c.classList.contains('active'))state.selectedChar=i;});
  state.running=true;
  state.player.x=W/2-29;state.player.y=H-90;
  genStars();drawBg();
  document.getElementById('overlay').style.display='none';
  document.getElementById('char-panel').style.display='none';
  document.getElementById('hud-lives').textContent='♥♥♥';
  document.getElementById('hud-level').textContent='1';
  document.getElementById('hud-char-name').textContent=CHARS[state.selectedChar].name.toUpperCase();
  document.getElementById('hud-score').textContent='0';
  lastTime=performance.now();
  animId=requestAnimationFrame(loop);
  loadLeaderboard();
}

document.addEventListener('keydown',function(e){
  if(state)state.keys[e.key]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',function(e){if(state)state.keys[e.key]=false;});

var touchX=null,touchY=null;
document.getElementById('gc').addEventListener('touchstart',function(e){
  touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;e.preventDefault();
},{passive:false});
document.getElementById('gc').addEventListener('touchmove',function(e){
  if(!state||touchX===null)return;
  var dx=e.touches[0].clientX-touchX,dy=e.touches[0].clientY-touchY;
  state.player.x=Math.max(0,Math.min(W-state.player.w,state.player.x+dx*1.4));
  state.player.y=Math.max(HUD_H,Math.min(H-state.player.h,state.player.y+dy*1.4));
  touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;e.preventDefault();
},{passive:false});

var lbTog=document.getElementById('lb-toggle');
var lbPanel=document.getElementById('leaderboard-panel');
lbTog.addEventListener('click',function(){
  var open=lbPanel.classList.toggle('open');
  lbTog.classList.toggle('open',open);
  lbTog.textContent=open?'CLOSE':'SCORES';
  if(open)loadLeaderboard();
});

document.getElementById('start-btn').addEventListener('click',startGame);
window.addEventListener('resize',function(){resize();drawBg();});
resize();drawBg();buildCharSelect();
setInterval(pollChain,400);pollChain();
loadLeaderboard();
</script>
</body>
</html>
